  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

80px; margin: 0 0 32px;\">Four synchronized formats — CSS custom properties (light + dark), Tailwind config, W3C JSON, and TypeScript constants. Excerpts below; the linked files are the source of truth.<\u002Fp>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 24px;\">\n        <div style=\"background: #12141D; border-radius: 14px; overflow: hidden;\">\n          <div style=\"display: flex; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #1F2330;\"><span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #717A8F;\">handoff/tokens.css — excerpt<\u002Fspan><a href=\"{{ hrefTokensCss }}\" download=\"tokens.css\" style=\"font-size: 11.5px; font-weight: 600; color: #6EDFF0; text-decoration: none;\">Open full file →<\u002Fa><\u002Fdiv>\n          <pre style=\"margin: 0; padding: 18px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.75; color: #C4CAD6; overflow-x: auto;\"><span style=\"color: #6B7CD5;\">:root<\u002Fspan> {\n  <span style=\"color: #2FCBE2;\">--primary-700<\u002Fspan>: #2B3990;  <span style=\"color: #565E72;\">/* logo indigo */<\u002Fspan>\n  <span style=\"color: #2FCBE2;\">--accent-500<\u002Fspan>: #07B7D1;   <span style=\"color: #565E72;\">/* logo cyan */<\u002Fspan>\n  <span style=\"color: #2FCBE2;\">--bg<\u002Fspan>: #FFFFFF;\n  <span style=\"color: #2FCBE2;\">--text-primary<\u002Fspan>: var(--neutral-950);\n  <span style=\"color: #2FCBE2;\">--brand<\u002Fspan>: var(--primary-700);\n  <span style=\"color: #2FCBE2;\">--focus-ring<\u002Fspan>: var(--accent-500);\n  <span style=\"color: #2FCBE2;\">--radius-md<\u002Fspan>: 8px;\n  <span style=\"color: #2FCBE2;\">--shadow-md<\u002Fspan>: 0 4px 12px rgba(19,24,64,.08)…;\n  <span style=\"color: #2FCBE2;\">--duration-150<\u002Fspan>: 150ms;\n}\n<span style=\"color: #6B7CD5;\">.dark<\u002Fspan> {\n  <span style=\"color: #2FCBE2;\">--bg<\u002Fspan>: #0E1017;\n  <span style=\"color: #2FCBE2;\">--brand<\u002Fspan>: var(--primary-400);\n  <span style=\"color: #2FCBE2;\">--shadow-sm<\u002Fspan>: none; <span style=\"color: #565E72;\">/* borders instead */<\u002Fspan>\n}<\u002Fpre>\n        <\u002Fdiv>\n        <div style=\"background: #12141D; border-radius: 14px; overflow: hidden;\">\n          <div style=\"display: flex; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid #1F2330;\"><span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #717A8F;\">handoff/tailwind.config.js — excerpt<\u002Fspan><a href=\"{{ hrefTailwind }}\" download=\"tailwind.config.js\" style=\"font-size: 11.5px; font-weight: 600; color: #6EDFF0; text-decoration: none;\">Open full file →<\u002Fa><\u002Fdiv>\n          <pre style=\"margin: 0; padding: 18px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.75; color: #C4CAD6; overflow-x: auto;\">module.exports = {\n  <span style=\"color: #2FCBE2;\">darkMode<\u002Fspan>: <span style=\"color: #F2C859;\">'class'<\u002Fspan>,\n  theme: { extend: {\n    colors: {\n      primary: { <span style=\"color: #F2C859;\">700: '#2B3990'<\u002Fspan>, … },\n      accent:  { <span style=\"color: #F2C859;\">500: '#07B7D1'<\u002Fspan>, … },\n      chart:   { 1: '#2B3990', … 8 },\n    },\n    fontFamily: {\n      display: [<span style=\"color: #F2C859;\">'Sora'<\u002Fspan>, …],\n      sans: [<span style=\"color: #F2C859;\">'\"Instrument Sans\"'<\u002Fspan>, …],\n      mono: [<span style=\"color: #F2C859;\">'\"JetBrains Mono\"'<\u002Fspan>, …],\n    },\n    fontSize: { <span style=\"color: #F2C859;\">'display-xl'<\u002Fspan>: ['72px', …], h1…, overline },\n    boxShadow / keyframes / animation / zIndex…\n  }}}<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 26: package -->\n  <section id=\"s26\" data-screen-label=\"26 Developer Handoff Package\" style=\"border-top: 1px solid #EEF0F4;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 80px 48px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.1em; color: #0793AC; margin-bottom: 16px;\">26<\u002Fdiv>\n      <h2 style=\"font-family: Sora, sans-serif; font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 32px;\">Developer Handoff Package<\u002Fh2>\n\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; margin-bottom: 32px;\">\n        <div style=\"border: 1px solid #EEF0F4; border-radius: 16px; padding: 28px;\">\n          <div style=\"font-family: Sora, sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 14px;\">Folder structure — Atomic Design<\u002Fdiv>\n          <pre style=\"margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.85; color: #444B5C; background: #F7F8FA; border-radius: 10px; padding: 16px; overflow-x: auto;\">src/\n├─ styles/\n│  ├─ tokens.css        ← from handoff/\n│  └─ globals.css\n├─ lib/\n│  ├─ tokens.ts         ← from handoff/\n│  ├─ cn.ts             (clsx + tailwind-merge)\n│  └─ format.ts         (Kz, dates pt-AO)\n├─ components/\n│  ├─ ui/               (atoms: Button, Input,\n│  │                     Badge, Avatar, Spinner…)\n│  ├─ composed/         (molecules: Field, Card,\n│  │                     Alert, Tabs, Pagination…)\n│  ├─ blocks/           (organisms: DataTable,\n│  │                     Sidebar, KpiCard, Chart…)\n│  └─ layouts/          (AppShell, MarketingPage)\n└─ app/                 (routes)<\u002Fpre>\n        <\u002Fdiv>\n        <div style=\"border: 1px solid #EEF0F4; border-radius: 16px; padding: 28px;\">\n          <div style=\"font-family: Sora, sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 14px;\">Variant system — CVA pattern<\u002Fdiv>\n          <pre style=\"margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.8; color: #444B5C; background: #F7F8FA; border-radius: 10px; padding: 16px; overflow-x: auto;\">const button = cva(\n  'inline-flex items-center gap-2 font-sans\n   font-semibold rounded-md transition\n   duration-150 ease-standard\n   focus-visible:ring-2\n   focus-visible:ring-accent-500\n   focus-visible:ring-offset-2\n   disabled:opacity-45',\n  { variants: {\n      variant: {\n        primary: 'bg-primary-700 text-white\n                  hover:bg-primary-800\n                  dark:bg-primary-400\n                  dark:text-neutral-950',\n        secondary: 'bg-primary-50\n                  text-primary-700',\n        outline: 'border border-neutral-200',\n        ghost: '', danger: 'bg-danger-600…',\n      },\n      size: { sm:'h-8 px-3 text-[12.5px]',\n              md:'h-10 px-4 text-sm',\n              lg:'h-12 px-6 text-[15px]' },\n    },\n    defaultVariants: { variant:'primary',\n                       size:'md' } });<\u002Fpre>\n          <div style=\"font-size: 12.5px; color: #717A8F; margin-top: 12px;\">Naming: PascalCase components, camelCase props, kebab-case files. One component per file; variants via CVA, never boolean soup.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border: 1px solid #EEF0F4; border-radius: 16px; padding: 28px;\">\n          <div style=\"font-family: Sora, sans-serif; font-size: 14px; font-weight: 600; margin-bottom: 14px;\">Implementation priority<\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 7px;\">\n            <sc-for list=\"{{ priority }}\" as=\"p\" hint-placeholder-count=\"8\">\n              <div style=\"display: flex; align-items: center; gap: 10px;\">\n                <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: #fff; background: {{ p.bg }}; border-radius: 6px; width: 24px; height: 20px; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0;\">{{ p.n }}<\u002Fspan>\n                <span style=\"font-size: 13px; color: #12141D; font-weight: 500;\">{{ p.name }}<\u002Fspan>\n                <span style=\"font-size: 11.5px; color: #9AA2B3; margin-left: auto;\">{{ p.why }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top: 18px; padding: 14px 16px; background: #ECFCFF; border-radius: 10px; font-size: 12.5px; line-height: 1.6; color: #0C7589;\"><strong>BRAND.md<\u002Fstrong> in handoff/ summarizes the entire brand for AI sessions — load it first in any Claude Code conversation.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- API specs -->\n      <h3 style=\"font-family: Sora, sans-serif; font-size: 22px; font-weight: 600; margin: 0 0 20px;\">Component API specs — 15 core components<\u002Fh3>\n      <div style=\"border: 1px solid #EEF0F4; border-radius: 14px; overflow: hidden;\">\n        <div style=\"display: grid; grid-template-columns: 150px 1.6fr 2fr; background: #F7F8FA; border-bottom: 1px solid #EEF0F4; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #717A8F;\">\n          <div style=\"padding: 12px 20px;\">Component<\u002Fdiv><div style=\"padding: 12px 16px;\">Props<\u002Fdiv><div style=\"padding: 12px 16px;\">Notes<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ apis }}\" as=\"a\" hint-placeholder-count=\"15\">\n          <div style=\"display: grid; grid-template-columns: 150px 1.6fr 2fr; border-bottom: 1px solid #F7F8FA; font-size: 13px; align-items: start;\">\n            <div style=\"padding: 13px 20px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #2B3990; font-weight: 500;\">{{ a.name }}<\u002Fdiv>\n            <div style=\"padding: 13px 16px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.7; color: #565E72;\">{{ a.props }}<\u002Fdiv>\n            <div style=\"padding: 13px 16px; line-height: 1.55; color: #444B5C;\">{{ a.notes }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 27: checklist -->\n  <section id=\"s27\" data-screen-label=\"27 Final Verification Checklist\" style=\"border-top: 1px solid #EEF0F4;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 80px 48px 128px;\">\n      <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.1em; color: #0793AC; margin-bottom: 16px;\">27<\u002Fdiv>\n      <h2 style=\"font-family: Sora, sans-serif; font-size: 36px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 12px;\">Final Verification Checklist<\u002Fh2>\n      <p style=\"font-size: 15px; line-height: 1.65; color: #565E72; max-width: 680px; margin: 0 0 32px;\">Every section of the brief, verified. Click any row's link to jump to the delivered work.<\u002Fp>\n      <div style=\"border: 1px solid #EEF0F4; border-radius: 14px; overflow: hidden; margin-bottom: 32px;\">\n        <div style=\"display: grid; grid-template-columns: 56px 1.4fr 2fr 110px; background: #F7F8FA; border-bottom: 1px solid #EEF0F4; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #717A8F;\">\n          <div style=\"padding: 12px 0 12px 20px;\">§<\u002Fdiv><div style=\"padding: 12px 16px;\">Deliverable<\u002Fdiv><div style=\"padding: 12px 16px;\">Includes<\u002Fdiv><div style=\"padding: 12px 16px;\">Status<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ checklist }}\" as=\"c\" hint-placeholder-count=\"27\">\n          <div style=\"display: grid; grid-template-columns: 56px 1.4fr 2fr 110px; border-bottom: 1px solid #F7F8FA; font-size: 13px; align-items: center;\">\n            <div style=\"padding: 11px 0 11px 20px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #9AA2B3;\">{{ c.n }}<\u002Fdiv>\n            <div style=\"padding: 11px 16px;\"><a href=\"{{ c.href }}\" style=\"color: #12141D; font-weight: 600; text-decoration: none;\" style-hover=\"color: #2B3990;\">{{ c.name }}<\u002Fa><\u002Fdiv>\n            <div style=\"padding: 11px 16px; color: #717A8F; font-size: 12.5px; line-height: 1.5;\">{{ c.inc }}<\u002Fdiv>\n            <div style=\"padding: 11px 16px;\"><span style=\"font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: 999px; background: #EBFAF3; color: #0C6A45;\">✅ Delivered<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background: #131840; border-radius: 16px; padding: 40px 48px; color: #fff; display: flex; justify-content: space-between; align-items: center; gap: 32px; flex-wrap: wrap;\">\n        <div>\n          <div style=\"font-family: Sora, sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 8px;\">27 / 27 sections delivered.<\u002Fdiv>\n          <div style=\"font-size: 14px; color: #93A1E3; max-width: 520px; line-height: 1.6;\">The handoff package (tokens.css · tailwind.config.js · tokens.json · tokens.ts · BRAND.md) is copy-paste ready for Claude Code. Start any implementation session by loading BRAND.md.<\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"{{ hrefBrand }}\" download=\"BRAND.md\" style=\"height: 48px; padding: 0 24px; border-radius: 10px; background: #fff; color: #131840; font-family: 'Instrument Sans', sans-serif; font-weight: 600; font-size: 14.5px; text-decoration: none; display: inline-flex; align-items: center; flex-shrink: 0;\">Open BRAND.md<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"border-top: 1px solid #EEF0F4;\">\n    <div style=\"max-width: 1240px; margin: 0 auto; padding: 40px 48px; display: flex; justify-content: space-between; align-items: center;\">\n      <div style=\"display: flex; align-items: center; gap: 8px;\">\n        <img src=\"ad897da8-4038-4ad6-935b-df0c4d3a9b0a\" alt=\"\" style=\"height: 18px;\">\n        <span style=\"font-size: 13px; color: #717A8F;\">Alio Analytics — Design System · Part V<\u002Fspan>\n      <\u002Fdiv>\n      <a href=\"01 Foundations.dc.html\" style=\"font-size: 14px; font-weight: 600; color: #2B3990; text-decoration: none;\">↺ Back to Foundations<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const R = window.__resources || {};\n    const files = [\n      { name: 'tokens.css', href: R.tokensCss || 'handoff/tokens.css' },\n      { name: 'tailwind.config.js', href: R.tailwindCfg || 'handoff/tailwind.config.js' },\n      { name: 'tokens.json', href: R.tokensJson || 'handoff/tokens.json' },\n      { name: 'tokens.ts', href: R.tokensTs || 'handoff/tokens.ts' },\n      { name: 'BRAND.md', href: R.brandMd || 'handoff/BRAND.md' },\n    ];\n    const priority = [\n      { n: '1', name: 'Button + focus ring', why: 'everything depends on it', bg: '#2B3990' },\n      { n: '2', name: 'Input / Field / Select', why: 'forms everywhere', bg: '#2B3990' },\n      { n: '3', name: 'Card + Badge', why: 'core surfaces', bg: '#2B3990' },\n      { n: '4', name: 'Alert + Toast', why: 'feedback layer', bg: '#3A49A9' },\n      { n: '5', name: 'Tabs + Pagination', why: 'navigation basics', bg: '#3A49A9' },\n      { n: '6', name: 'Modal + Drawer', why: 'overlay system', bg: '#3A49A9' },\n      { n: '7', name: 'DataTable', why: 'BI core', bg: '#0793AC' },\n      { n: '8', name: 'AppShell (Sidebar+Topbar)', why: 'dashboard frame', bg: '#0793AC' },\n      { n: '9', name: 'KpiCard + Chart wrapper', why: 'analytics pages', bg: '#0793AC' },\n      { n: '10', name: 'EmptyState + Skeleton', why: 'loading polish', bg: '#07B7D1' },\n    ];\n    const apis = [\n      { name: 'Button', props: \"variant: primary|secondary|outline|ghost|danger|success|link · size: sm|md|lg · loading?: bool · leftIcon/rightIcon?: ReactNode · asChild?: bool\", notes: 'Loading swaps left icon for spinner and sets aria-busy. Icon-only requires aria-label. Min touch 44px via padding.' },\n      { name: 'IconButton', props: 'icon: ReactNode · label: string (required) · variant · size', notes: 'label feeds aria-label + tooltip. 40px visual, 44px hit area.' },\n      { name: 'Input', props: 'size: sm|md · invalid?: bool · prefix/suffix?: ReactNode · leftIcon?: ReactNode', notes: 'Always wrapped by Field. Focus: cyan border + 3px soft ring.' },\n      { name: 'Field', props: 'label: string · required?: bool · help?: string · error?: string · children', notes: 'Wires htmlFor/id, aria-describedby, aria-invalid. Error replaces help, icon + danger-600 text.' },\n      { name: 'Select / Combobox', props: 'options: {value,label,icon?}[] · value · onChange · searchable?: bool · placeholder', notes: 'Combobox highlights matched substring in bold. Menu = radius-lg, shadow-lg, max-h 320px.' },\n      { name: 'Checkbox / Radio / Switch', props: 'checked · onChange · label?: string · disabled?: bool', notes: '18px box/circle; switch 40×23. Brand-700 when on (dark: brand-400). Label click toggles.' },\n      { name: 'Badge', props: 'tone: default|brand|accent|success|warning|danger · variant: soft|solid|outline', notes: 'Soft = 50-bg + 700-text. 12px/600, radius-full, 3px 10px padding.' },\n      { name: 'Avatar', props: 'name: string · src?: string · size: 24|32|40|48 · status?: online|away', notes: 'Initials fallback on brand gradient. AvatarGroup: max?: number, −9px overlap, +N overflow chip.' },\n      { name: 'Card', props: 'padding: compact|default|feature · interactive?: bool · as?: element', notes: 'interactive adds hover lift (200ms) + cursor. Border neutral-100; dark: surface + border.' },\n      { name: 'Alert', props: 'tone: info|success|warning|danger · title · children · onDismiss?', notes: 'Icon per tone (never color alone). role=status; danger uses role=alert.' },\n      { name: 'Toast (useToast)', props: \"toast({ title, description?, tone?, action? }) · duration=5000\", notes: 'Dark panel both modes. Bottom-right, stacks max 3, pauses on hover. aria-live=polite.' },\n      { name: 'Modal', props: 'o
